name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "apk/**"
      - "DOWNLOAD_APK.md"

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove generated sample tests
        run: rm -rf test

      - name: Get packages
        run: flutter pub get

      - name: Configure Android app
        shell: bash
        run: |
          set -e
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = ".*"/applicationId = "com.explapp.taskstatusreminder"/g' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle.kts
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 23/g' android/app/build.gradle.kts
            if ! grep -q 'isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts; then
              sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts
            fi
            if ! grep -q 'multiDexEnabled = true' android/app/build.gradle.kts; then
              sed -i '/defaultConfig {/a\        multiDexEnabled = true' android/app/build.gradle.kts
            fi
            if ! grep -q 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs' android/app/build.gradle.kts; then
              cat >> android/app/build.gradle.kts <<'GRADLE'

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          GRADLE
            fi
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId ".*"/applicationId "com.explapp.taskstatusreminder"/g' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 23/g' android/app/build.gradle
            if ! grep -q 'coreLibraryDesugaringEnabled true' android/app/build.gradle; then
              sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' android/app/build.gradle
            fi
            if ! grep -q 'multiDexEnabled true' android/app/build.gradle; then
              sed -i '/defaultConfig {/a\        multiDexEnabled true' android/app/build.gradle
            fi
            if ! grep -q 'coreLibraryDesugaring "com.android.tools:desugar_jdk_libs' android/app/build.gradle; then
              cat >> android/app/build.gradle <<'GRADLE'

          dependencies {
              coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
          }
          GRADLE
            fi
          fi
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/app_icon.xml <<'ICON'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#F8FAF7" android:pathData="M0,0 L108,0 L108,108 L0,108 Z"/>
              <path android:fillColor="#15803D" android:pathData="M18,22 L90,22 L90,86 L18,86 Z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M28,35 L80,35 L80,48 L28,48 Z"/>
              <path android:fillColor="#F97316" android:pathData="M28,58 L65,58 L65,72 L28,72 Z"/>
              <path android:fillColor="#DC2626" android:pathData="M78,55 L92,69 L78,83 L64,69 Z"/>
              <path android:strokeColor="#FFFFFF" android:strokeWidth="5" android:strokeLineCap="round" android:strokeLineJoin="round" android:fillColor="@android:color/transparent" android:pathData="M72,69 L77,74 L86,62"/>
          </vector>
          ICON
          cat > android/app/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <application android:label="مهامي الملوّنة" android:name="${applicationName}" android:icon="@drawable/app_icon" android:usesCleartextTraffic="false">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.MY_PACKAGE_REPLACED" />
                          <action android:name="android.intent.action.QUICKBOOT_POWERON" />
                          <action android:name="com.htc.intent.action.QUICKBOOT_POWERON" />
                      </intent-filter>
                  </receiver>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          MANIFEST

      - name: Analyze
        run: |
          rm -f test/widget_test.dart
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release

      - name: Copy APK to repository folder
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/task-status-reminder.apk
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/raw/${GITHUB_REF_NAME}/apk/task-status-reminder.apk"
          cat > DOWNLOAD_APK.md <<EOF
          # رابط تحميل التطبيق

          بعد نجاح البناء، حمل ملف APK مباشرة من هذا الرابط:

          ${APK_URL}

          اسم الملف:

          apk/task-status-reminder.apk
          EOF
          {
            echo "## رابط تحميل APK"
            echo ""
            echo "${APK_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save APK file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/task-status-reminder.apk DOWNLOAD_APK.md
          if git diff --cached --quiet; then
            echo "APK already up to date"
          else
            git commit -m "Update direct APK"
            git push
          fi
