name: task_status_reminder
description: Arabic task manager with required, in progress, completed statuses and background reminders.
publish_to: "none"

version: 4.0.0+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
